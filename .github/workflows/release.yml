name: Release desktop applications

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    environment: release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-x64
            os: windows-latest
            command: npx electron-builder --win nsis --x64 --publish never --config.extraMetadata.versusSignedUpdates=true
            subject: apps/pet/dist/*.exe
          - platform: macos
            os: macos-latest
            command: npx electron-builder --mac dmg --universal --publish never --config.extraMetadata.versusSignedUpdates=true
            subject: apps/pet/dist/*.dmg
          - platform: linux-x64
            os: ubuntu-latest
            command: npx electron-builder --linux AppImage --x64 --publish never
            subject: apps/pet/dist/*.AppImage
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: apps/pet
    env:
      CSC_LINK: ${{ matrix.os == 'windows-latest' && secrets.WINDOWS_CSC_LINK || matrix.os == 'macos-latest' && secrets.MAC_CSC_LINK || '' }}
      CSC_KEY_PASSWORD: ${{ matrix.os == 'windows-latest' && secrets.WINDOWS_CSC_KEY_PASSWORD || matrix.os == 'macos-latest' && secrets.MAC_CSC_KEY_PASSWORD || '' }}
      APPLE_ID: ${{ matrix.os == 'macos-latest' && secrets.APPLE_ID || '' }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ matrix.os == 'macos-latest' && secrets.APPLE_APP_SPECIFIC_PASSWORD || '' }}
      APPLE_TEAM_ID: ${{ matrix.os == 'macos-latest' && secrets.APPLE_TEAM_ID || '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            apps/pet/package-lock.json
            packages/network/package-lock.json
            versus/package-lock.json
      - name: Install contract dependencies
        run: npm ci
        working-directory: versus
      - name: Install network dependencies
        run: npm ci
        working-directory: packages/network
      - name: Install desktop dependencies
        run: npm ci
      - name: Match tag to desktop version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: test "${GITHUB_REF_NAME#v}" = "$(node -p "require('./package.json').version")"
      - name: Test repository
        run: npm test
        working-directory: ${{ github.workspace }}
      - name: Build packages
        shell: bash
        run: ${{ matrix.command }}
      - name: Verify Windows Authenticode signature
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $files = Get-ChildItem dist -Filter *.exe
          if (-not $files) { throw "No Windows installer found" }
          foreach ($file in $files) {
            if ((Get-AuthenticodeSignature $file.FullName).Status -ne "Valid") { throw "Invalid Authenticode signature: $($file.Name)" }
          }
      - name: Verify Apple signature and notarization
        if: runner.os == 'macOS'
        shell: bash
        run: |
          app_path=$(find dist -type d -name '*.app' -print -quit)
          test -n "$app_path"
          codesign --verify --deep --strict --verbose=2 "$app_path"
          xcrun stapler validate "$app_path"
      - name: Attest build provenance
        uses: actions/attest@v4
        with:
          subject-path: ${{ matrix.subject }}
      - uses: actions/upload-artifact@v4
        with:
          name: versus-cypher-${{ matrix.platform }}
          path: |
            apps/pet/dist/*.exe
            apps/pet/dist/*.dmg
            apps/pet/dist/*.AppImage
            apps/pet/dist/*.blockmap
            apps/pet/dist/latest*.yml
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: versus-cypher-*
          path: release
          merge-multiple: true
      - name: Generate checksums
        working-directory: release
        run: sha256sum * > SHA256SUMS.txt
      - name: Publish immutable release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" release/* --verify-tag --generate-notes --title "Versus Cypher ${GITHUB_REF_NAME}"
