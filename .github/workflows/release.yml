name: Release desktop applications

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions: {}

jobs:
  security:
    name: Security gates
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false
          submodules: recursive
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
      - name: Install contract dependencies
        run: npm ci
        working-directory: versus
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@b00af27efadbc7b4ca8b82abbd903b17cc874d2a # v1
        with:
          version: v1.7.1
          cache: false
      - name: Run strict deep contract invariants
        run: forge test --match-contract VersusInvariants -vv
        working-directory: versus
        env:
          FOUNDRY_PROFILE: deep
      - name: Scan tracked source and Git history for credentials
        run: npm run security:secrets
      - name: Audit shipped dependency trees
        run: npm run security:audit:production

  build:
    name: Build ${{ matrix.platform }}
    needs: security
    environment: release
    permissions:
      contents: read
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-x64
            os: windows-latest
            command: npx electron-builder --win nsis --x64 --publish never --config.extraMetadata.versusSignedUpdates=true
            subject: apps/pet/dist/*.exe
          - platform: macos
            os: macos-latest
            command: npx electron-builder --mac dmg --universal --publish never --config.extraMetadata.versusSignedUpdates=true
            subject: apps/pet/dist/*.dmg
          - platform: linux-x64
            os: ubuntu-latest
            command: npx electron-builder --linux AppImage --x64 --publish never
            subject: apps/pet/dist/*.AppImage
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: apps/pet
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            apps/pet/package-lock.json
            packages/network/package-lock.json
            versus/package-lock.json
      - name: Install contract dependencies
        run: npm ci
        working-directory: versus
      - name: Install network dependencies
        run: npm ci
        working-directory: packages/network
      - name: Install desktop dependencies
        run: npm ci
      - name: Match tag to desktop version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: test "${GITHUB_REF_NAME#v}" = "$(node -p "require('./package.json').version")"
      - name: Test repository
        run: npm test
        working-directory: ${{ github.workspace }}
      - name: Build packages
        if: runner.os != 'Windows'
        shell: bash
        run: ${{ matrix.command }}
        env:
          CSC_LINK: ${{ matrix.os == 'macos-latest' && secrets.MAC_CSC_LINK || '' }}
          CSC_KEY_PASSWORD: ${{ matrix.os == 'macos-latest' && secrets.MAC_CSC_KEY_PASSWORD || '' }}
          APPLE_ID: ${{ matrix.os == 'macos-latest' && secrets.APPLE_ID || '' }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ matrix.os == 'macos-latest' && secrets.APPLE_APP_SPECIFIC_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ matrix.os == 'macos-latest' && secrets.APPLE_TEAM_ID || '' }}
      - name: Sign in to Azure with the protected release identity
        if: runner.os == 'Windows'
        uses: Azure/login@2dd0bbf4064d5a1812889dc200bb8eed2597f82a # v3
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      - name: Build and sign Windows package
        if: runner.os == 'Windows'
        shell: pwsh
        run: npx electron-builder --win nsis --x64 --publish never --config.extraMetadata.versusSignedUpdates=true
      - name: Verify Windows Authenticode signature
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $files = Get-ChildItem dist -Recurse -Filter *.exe
          if (-not $files) { throw "No Windows executables found" }
          foreach ($file in $files) {
            $signature = Get-AuthenticodeSignature $file.FullName
            if ($signature.Status -ne "Valid") { throw "Invalid Authenticode signature: $($file.Name)" }
            if ($signature.SignerCertificate.Subject -notmatch 'CN=DIGITAL SHEPARD LLC(?:,|$)') {
              throw "Unexpected Authenticode publisher: $($signature.SignerCertificate.Subject)"
            }
          }
      - name: Verify Apple signature and notarization
        if: runner.os == 'macOS'
        shell: bash
        run: |
          app_path=$(find dist -type d -name '*.app' -print -quit)
          test -n "$app_path"
          codesign --verify --deep --strict --verbose=2 "$app_path"
          xcrun stapler validate "$app_path"
      - name: Attest build provenance
        uses: actions/attest@f6bf1532d7d6793fce74eac584813a8eee607999 # v4
        with:
          subject-path: ${{ matrix.subject }}
      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: versus-cypher-${{ matrix.platform }}
          path: |
            apps/pet/dist/*.exe
            apps/pet/dist/*.dmg
            apps/pet/dist/*.AppImage
            apps/pet/dist/*.blockmap
            apps/pet/dist/latest*.yml
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6
        with:
          pattern: versus-cypher-*
          path: release
          merge-multiple: true
      - name: Generate checksums
        working-directory: release
        run: sha256sum * > SHA256SUMS.txt
      - name: Publish immutable release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" release/* --verify-tag --generate-notes --title "Versus Cypher ${GITHUB_REF_NAME}"
