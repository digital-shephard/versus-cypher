name: Release desktop applications

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      macos_notarization_run_id:
        description: Existing release run ID whose macOS notarization state should be resumed
        required: false
        type: string

permissions: {}

jobs:
  security:
    name: Security gates
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false
          submodules: recursive
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
      - name: Install contract dependencies
        run: npm ci
        working-directory: versus
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@b00af27efadbc7b4ca8b82abbd903b17cc874d2a # v1
        with:
          version: v1.7.1
          cache: false
      - name: Run strict deep contract invariants
        run: forge test --match-contract VersusInvariants -vv
        working-directory: versus
        env:
          FOUNDRY_PROFILE: deep
      - name: Scan tracked source and Git history for credentials
        run: npm run security:secrets
      - name: Audit shipped dependency trees
        run: npm run security:audit:production

  build:
    name: Build ${{ matrix.platform }}
    needs: security
    environment: release
    permissions:
      contents: read
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-x64
            os: windows-latest
            command: npx electron-builder --win nsis --x64 --publish never --config.extraMetadata.versusSignedUpdates=true
            subject: apps/pet/dist/*.exe
          - platform: linux-x64
            os: ubuntu-latest
            command: npx electron-builder --linux AppImage --x64 --publish never
            subject: apps/pet/dist/*.AppImage
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: apps/pet
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            apps/pet/package-lock.json
            packages/network/package-lock.json
            versus/package-lock.json
      - name: Install contract dependencies
        run: npm ci
        working-directory: versus
      - name: Install network dependencies
        run: npm ci
        working-directory: packages/network
      - name: Install desktop dependencies
        run: npm ci
      - name: Match tag to desktop version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: test "${GITHUB_REF_NAME#v}" = "$(node -p "require('./package.json').version")"
      - name: Test repository
        run: npm test
        working-directory: ${{ github.workspace }}
      - name: Build packages
        if: runner.os != 'Windows'
        shell: bash
        run: ${{ matrix.command }}
      - name: Sign in to Azure with the protected release identity
        if: runner.os == 'Windows'
        uses: Azure/login@2dd0bbf4064d5a1812889dc200bb8eed2597f82a # v3
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      - name: Build and sign Windows package
        if: runner.os == 'Windows'
        shell: pwsh
        run: npx electron-builder --win nsis --x64 --publish never --config.extraMetadata.versusSignedUpdates=true
      - name: Verify packaged Base deployment
        run: npm run verify:packaged-deployment
      - name: Verify Windows Authenticode signature
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $files = Get-ChildItem dist -Recurse -Filter *.exe
          if (-not $files) { throw "No Windows executables found" }
          foreach ($file in $files) {
            $signature = Get-AuthenticodeSignature $file.FullName
            if ($signature.Status -ne "Valid") { throw "Invalid Authenticode signature: $($file.Name)" }
            if ($signature.SignerCertificate.Subject -notmatch 'CN=DIGITAL SHEPARD LLC(?:,|$)') {
              throw "Unexpected Authenticode publisher: $($signature.SignerCertificate.Subject)"
            }
          }
      - name: Attest build provenance
        uses: actions/attest@f6bf1532d7d6793fce74eac584813a8eee607999 # v4
        with:
          subject-path: ${{ matrix.subject }}
      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: versus-cypher-${{ matrix.platform }}
          path: |
            apps/pet/dist/*.exe
            apps/pet/dist/*.dmg
            apps/pet/dist/*.zip
            apps/pet/dist/*.AppImage
            apps/pet/dist/*.blockmap
            apps/pet/dist/latest*.yml
          if-no-files-found: error

  macos:
    name: Build macos-universal
    needs: security
    environment: release
    permissions:
      actions: read
      attestations: write
      contents: read
      id-token: write
    runs-on: macos-latest
    timeout-minutes: 355
    defaults:
      run:
        working-directory: apps/pet
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            apps/pet/package-lock.json
            packages/network/package-lock.json
            versus/package-lock.json
      - name: Install contract dependencies
        if: github.run_attempt == 1 && inputs.macos_notarization_run_id == ''
        run: npm ci
        working-directory: versus
      - name: Install network dependencies
        if: github.run_attempt == 1 && inputs.macos_notarization_run_id == ''
        run: npm ci
        working-directory: packages/network
      - name: Install desktop dependencies
        run: npm ci
      - name: Match tag to desktop version
        if: github.run_attempt == 1 && inputs.macos_notarization_run_id == '' && startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: test "${GITHUB_REF_NAME#v}" = "$(node -p "require('./package.json').version")"
      - name: Test repository
        if: github.run_attempt == 1 && inputs.macos_notarization_run_id == ''
        run: npm test
        working-directory: ${{ github.workspace }}
      - name: Build and sign resumable app
        if: github.run_attempt == 1 && inputs.macos_notarization_run_id == ''
        shell: bash
        run: npx electron-builder --mac --dir --universal --publish never --config.mac.notarize=false --config.extraMetadata.versusSignedUpdates=true
        env:
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
      - name: Verify Developer ID signature before submission
        if: github.run_attempt == 1 && inputs.macos_notarization_run_id == ''
        shell: bash
        run: |
          set -euo pipefail
          app_path=$(find dist -type d -name '*.app' -print -quit)
          test -n "$app_path"
          codesign --verify --deep --strict --verbose=2 "$app_path"
          signature=$(codesign -dv --verbose=4 "$app_path" 2>&1)
          grep -F 'Authority=Developer ID Application: DIGITAL SHEPARD LLC (HN89TZMX7Z)' <<<"$signature"
          grep -F 'TeamIdentifier=HN89TZMX7Z' <<<"$signature"
          grep -E 'flags=.*runtime' <<<"$signature"
      - name: Submit app to Apple notarization service
        if: github.run_attempt == 1 && inputs.macos_notarization_run_id == ''
        shell: bash
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          app_path=$(find dist -type d -name '*.app' -print -quit)
          mkdir -p dist/notarization
          ditto -c -k --sequesterRsrc --keepParent "$app_path" dist/notarization/Versus-Cypher-signed-app.zip
          xcrun notarytool submit dist/notarization/Versus-Cypher-signed-app.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --output-format json > dist/notarization/submission.json
          node -e 'const fs=require("fs");const value=JSON.parse(fs.readFileSync("dist/notarization/submission.json","utf8"));if(!/^[0-9a-f-]{36}$/i.test(value.id||""))throw new Error("Apple did not return a notarization submission ID")'
      - name: Preserve resumable notarization state
        if: github.run_attempt == 1 && inputs.macos_notarization_run_id == ''
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: macos-notarization-state
          path: |
            apps/pet/dist/notarization/Versus-Cypher-signed-app.zip
            apps/pet/dist/notarization/submission.json
          compression-level: 0
          if-no-files-found: error
          retention-days: 7
      - name: Restore notarization state from the previous attempt
        if: github.run_attempt > 1 || inputs.macos_notarization_run_id != ''
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6
        with:
          name: macos-notarization-state
          path: apps/pet/dist/notarization
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ inputs.macos_notarization_run_id || github.run_id }}
      - name: Restore signed app from the previous attempt
        if: github.run_attempt > 1 || inputs.macos_notarization_run_id != ''
        shell: bash
        run: |
          set -euo pipefail
          test -f dist/notarization/Versus-Cypher-signed-app.zip
          test -f dist/notarization/submission.json
          mkdir -p dist/mac-universal
          ditto -x -k dist/notarization/Versus-Cypher-signed-app.zip dist/mac-universal
          app_path=$(find dist/mac-universal -type d -name '*.app' -print -quit)
          test -n "$app_path"
          codesign --verify --deep --strict --verbose=2 "$app_path"
      - name: Wait for the existing Apple submission
        shell: bash
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          NOTARY_POLL_TIMEOUT_SECONDS: 18000
        run: |
          set -euo pipefail
          submission_id=$(node -e 'const fs=require("fs");const value=JSON.parse(fs.readFileSync("dist/notarization/submission.json","utf8"));if(!/^[0-9a-f-]{36}$/i.test(value.id||""))process.exit(1);process.stdout.write(value.id)')
          deadline=$((SECONDS + NOTARY_POLL_TIMEOUT_SECONDS))
          while (( SECONDS < deadline )); do
            if ! xcrun notarytool info "$submission_id" \
                --apple-id "$APPLE_ID" \
                --password "$APPLE_APP_SPECIFIC_PASSWORD" \
                --team-id "$APPLE_TEAM_ID" \
                --output-format json > dist/notarization/status.tmp.json; then
              rm -f dist/notarization/status.tmp.json
              echo "Apple status check failed transiently; retrying without creating a new submission."
              sleep 120
              continue
            fi
            mv dist/notarization/status.tmp.json dist/notarization/status.json
            status=$(node -e 'const fs=require("fs");process.stdout.write(JSON.parse(fs.readFileSync("dist/notarization/status.json","utf8")).status||"")')
            case "$status" in
              Accepted)
                for attempt in {1..5}; do
                  if xcrun notarytool log "$submission_id" \
                      --apple-id "$APPLE_ID" \
                      --password "$APPLE_APP_SPECIFIC_PASSWORD" \
                      --team-id "$APPLE_TEAM_ID" \
                      dist/notarization/log.json; then
                    break
                  fi
                  echo "Apple log download failed transiently; retrying ($attempt/5)."
                  sleep 30
                done
                exit 0
                ;;
              Invalid|Rejected)
                xcrun notarytool log "$submission_id" \
                  --apple-id "$APPLE_ID" \
                  --password "$APPLE_APP_SPECIFIC_PASSWORD" \
                  --team-id "$APPLE_TEAM_ID" \
                  dist/notarization/log.json || true
                echo "Apple rejected notarization; inspect the saved notarization log."
                exit 1
                ;;
              "In Progress") sleep 120 ;;
              *) echo "Unexpected notarization status: $status"; exit 1 ;;
            esac
          done
          echo "Apple notarization remains in progress. Re-run failed jobs to resume this submission."
          exit 75
      - name: Preserve Apple rejection diagnostics
        if: failure() && hashFiles('apps/pet/dist/notarization/log.json') != ''
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: macos-notarization-diagnostics-attempt-${{ github.run_attempt }}
          path: |
            apps/pet/dist/notarization/status.json
            apps/pet/dist/notarization/log.json
          if-no-files-found: error
          retention-days: 7
      - name: Staple ticket and build distributable packages
        shell: bash
        run: |
          set -euo pipefail
          app_path=$(find dist -type d -name '*.app' -print -quit)
          test -n "$app_path"
          stapled=false
          for attempt in {1..10}; do
            if xcrun stapler staple "$app_path"; then
              stapled=true
              break
            fi
            echo "Apple ticket stapling failed transiently; retrying ($attempt/10)."
            sleep 30
          done
          test "$stapled" = true
          npx electron-builder --mac dmg zip --universal --prepackaged "$app_path" --publish never --config.mac.notarize=false --config.extraMetadata.versusSignedUpdates=true
      - name: Verify packaged Base deployment
        run: npm run verify:packaged-deployment
      - name: Verify Apple signature and notarization
        shell: bash
        run: |
          set -euo pipefail
          app_path=$(find dist -type d -name '*.app' -print -quit)
          dmg_path=$(find dist -maxdepth 1 -type f -name '*.dmg' -print -quit)
          zip_path=$(find dist -maxdepth 1 -type f -name '*.zip' ! -path '*/notarization/*' -print -quit)
          test -n "$app_path"
          test -n "$dmg_path"
          test -n "$zip_path"

          codesign --verify --deep --strict --verbose=2 "$app_path"
          signature=$(codesign -dv --verbose=4 "$app_path" 2>&1)
          grep -F 'Authority=Developer ID Application: DIGITAL SHEPARD LLC (HN89TZMX7Z)' <<<"$signature"
          grep -F 'TeamIdentifier=HN89TZMX7Z' <<<"$signature"
          grep -E 'flags=.*runtime' <<<"$signature"
          spctl --assess --type execute --verbose=4 "$app_path"
          xcrun stapler validate "$app_path"
      - name: Attest build provenance
        uses: actions/attest@f6bf1532d7d6793fce74eac584813a8eee607999 # v4
        with:
          subject-path: |
            apps/pet/dist/*.dmg
            apps/pet/dist/*.zip
      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: versus-cypher-macos-universal
          path: |
            apps/pet/dist/*.dmg
            apps/pet/dist/*.zip
            apps/pet/dist/*.blockmap
            apps/pet/dist/latest*.yml
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - build
      - macos
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6
        with:
          pattern: versus-cypher-*
          path: release
          merge-multiple: true
      - name: Generate checksums
        working-directory: release
        run: sha256sum * > SHA256SUMS.txt
      - name: Publish immutable release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" release/* --verify-tag --generate-notes --title "Versus Cypher ${GITHUB_REF_NAME}"
